# render.yaml — define a infraestrutura do backend no Render
# O Render lê este ficheiro automaticamente quando ligas o repositório

services:
  - type: web
    name: pt-manager-api
    runtime: docker
    dockerfilePath: ./Dockerfile

    # O Render verifica este endpoint a cada 30 segundos para confirmar
    # que o container está vivo — o nosso /health não requer JWT, ideal para isto
    healthCheckPath: /api/v1/health

    # Variáveis com sync: false têm de ser preenchidas manualmente
    # no dashboard do Render — nunca ficam no ficheiro (segurança)
    envVars:
      - key: DATABASE_URL
        sync: false

      - key: API_KEY
        sync: false

      - key: SECRET_KEY
        sync: false

      - key: CORS_ORIGINS
        sync: false

      - key: RESEND_API_KEY
        sync: false

      - key: EMAIL_FROM
        sync: false

      - key: CLOUDINARY_CLOUD_NAME
        sync: false

      - key: CLOUDINARY_API_KEY
        sync: false

      - key: CLOUDINARY_API_SECRET
        sync: false

      - key: STRIPE_SECRET_KEY
        sync: false

      - key: STRIPE_WEBHOOK_SECRET
        sync: false

      - key: STRIPE_PRICE_FREE
        sync: false

      - key: STRIPE_PRICE_STARTER
        sync: false

      - key: STRIPE_PRICE_PRO
        sync: false

      - key: STRIPE_SUCCESS_URL
        sync: false

      - key: STRIPE_CANCEL_URL
        sync: false

      - key: STRIPE_PORTAL_URL
        sync: false

      # Valores fixos — não sensíveis, podem ficar no ficheiro
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "480"

      - key: CORS_ORIGINS
        value: "https://pt-manager-front-end.vercel.app/"

      - key: TRIAL_DAYS
        value: "15"

      - key: TIMEZONE
        value: "Europe/Lisbon"
