# docker-compose.yml
#version: '3.8'

services:
  db:
    image: postgres:16
    container_name: pt_manager_db
    environment:
      POSTGRES_USER: pt_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pt_pass} # Usar variável de ambiente
      POSTGRES_DB: pt_manager
    ports:
      - "5432:5432"
    volumes:
      - pt_manager_pgdata:/var/lib/postgresql/data
      - ./backups:/backups # Pasta para backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pt_user -d pt_manager"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pt_manager_api
    depends_on:
      db:
        condition: service_healthy # Espera DB estar pronto
    environment:
      DATABASE_URL: postgresql+psycopg2://pt_user:${DB_PASSWORD:-pt_pass}@db:5432/pt_manager
      API_KEY: ${API_KEY}
      SECRET_KEY: ${SECRET_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs # Persistir logs
    restart: unless-stopped

volumes:
  pt_manager_pgdata:
    driver: local
